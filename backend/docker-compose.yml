services:
  postgres:
    image: postgres:16-alpine
    container_name: cape-town-spurs-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cape_town_spurs
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cape_town_spurs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
